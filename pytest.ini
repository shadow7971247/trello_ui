[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts =
    -v
    --strict-markers
    --tb=short
    --alluredir=allure-results
markers =
    smoke: быстрые smoke UI-тесты
    ui: веб UI-тесты Trello
    local: локальный прогон (все тесты без browserstack)
    browserstack: mobile-облако (BrowserStack); для UI не используется; -m "not browserstack"
